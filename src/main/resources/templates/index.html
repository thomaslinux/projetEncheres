<!DOCTYPE html>

<!--  appel du fragment layout avec les paramètre -->
<html data-th-replace="~{layouts/layout :: frag-layout
						(title= ~{:: title},
						content= ~{::main} )}">
<!--  tire passé en paramètre -->
<title>Index</title>


<main>
    <h2>Page de connexion</h2>

    <form th:action="@{/login}"
          method="post">

        <ul class="flex-outer">
            <li>
                <label for="idUsername">Identifiant</label>
                <input id="idUsername" type="text" name="username">
            </li>
            <li>
                <label for="idPassword">Mot de passe</label>
                <input id="idPassword" type="password" name="password">
            </li>
            <li>
                <button type="submit">Se Connecter</button>
            </li>
        </ul>
    </form>


</main>
</html>
