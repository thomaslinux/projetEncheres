<!DOCTYPE html>

<!--  appel du fragment layout avec les paramètre -->
<html lang="fr" data-th-replace="~{layout/layout :: frag_layout
						(title= ~{:: title},
						content= ~{::main} )}">
<title>Vente</title>
<main>
    <h2>Mettre un article en vente</h2>

    <form class="formulaire" th:action="@{/encheres/create}" method="post" th:object="${article}">
        <ul class="flex-outer">
            <li>
                <input type="text" th:field="${user.id_utilisateur}">
            </li>
            <li><label for="idimage_lien">Ajouter une image</label>
                <input id="idimage_lien" type="text" th:field="*{image_lien}"></li>

            <li><label for="idnom_article">Nom d'Article</label>
                <input id="idnom_article" type="text" th:field="*{nom_article}"></li>

            <li><label for="iddescription">Description</label>
                <input id="iddescription" type="text" th:field="*{description}"></li>

            <li><label for="date_debut_enchere">Date debut enchere</label>
                <input id="date_debut_enchere" type="date" th:field="*{date_debut_enchere}"></li>

            <li><label for="date_fin_enchere">Date fin enchere</label>
                <input id="date_fin_enchere" type="date" th:field="*{date_fin_enchere}"></li>

            <li>
                <label for="prix_de_base">Prix de Base</label>
                <input id="prix_de_base" type="text" inputmode="numeric" pattern="[0-9]*" th:field="*{prix_de_base}">
<!--                <span class="error" th:if="${#fields.hasErrors('prix_de_base')}" th:errors="*{prix_de_base}"></span>-->
            </li>

            <!--    private int prix_de_vente;-->

<!--
            <li><label for="vente_en_cours">Vente en cours</label>
                <input id="vente_en_cours" type="radio" th:field="*{vente_en_cours}"></li>
-->

            <li><label for="idCategorie">Categorie</label>
                <select id="idCategorie" th:field="*{categorie}">
                <option th:each="item : ${categorieList}"

                        th:value="${item.id_categorie}"
                        th:text="${item.libelle}">



                </option>
            </select></li>
            <li>
                <button type="submit">Ajouter</button>
            </li>
        </ul>
    </form>


</main>


</html>
