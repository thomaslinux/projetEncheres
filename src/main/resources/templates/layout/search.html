<!DOCTYPE html>
<html lang="fr">
<div th:fragment="search-container" class="search-container">
    <form id="searchBar" th:action="@{/encheres/search}" method="get">
        <div>
            <input type="search" name="q" placeholder="Recherche">
            <button class="btnLupe" type="submit">&#128270;</button>
        </div>
        <div id="searchCheckbox">
            <div>
                <label>
                    <input class="chec" id="byCategorie" type="checkbox" name="byCategorie" checked><span> Par catégorie</span>
                </label>
            </div>
            <div>
                <label>
                    <input id="byDescription" type="checkbox" name="byDescription" checked><span> Par description</span>
                </label>
            </div>
            <div>
                <input id="currentCategory" type="search" name="categorie" style="display: none" autocomplete="off">
            </div>
        </div>
    </form>
</div>
</html>
