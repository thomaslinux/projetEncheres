<!DOCTYPE html>

<!--  appel du fragment layout avec les paramètre -->
<html lang="fr" data-th-replace="~{layout/layout :: frag_layout
						(title= ~{:: title},
						content= ~{::main} )}">
<title>Liste des Articles Enchères</title>


<main>
    <h2>Liste des Articles Enchères</h2>

    <section class="articles">

        <article class="fiche"
                 th:each="item : ${articleLst}">

            <div class="image">
                <img src="/images/ballonKilyan.jpg" alt="Image article">
            </div>





            <div class="infos">
                <h3 th:text="${item.nom_article}">Nom article</h3>

                <p class="categorie"th:text="${item.categorie?.libelle}">Catégorie</p>
                <p> Fin de l’enchère :<strong th:text="${item.date_fin_enchere}"> date</strong></p>
                <p>Prix de base : <strong th:text="${item.prix_de_base}"></strong> points </p>


                <a class="btn"
                   th:href="@{/encheres/details_vente(id=${item.id_article})}">
                    Voir détails
                </a>

            </div>

        </article>

    </section>









<!------------------------------------------------>
    <table>
        <thead>
        <tr>
            <th>Article</th>
            <th>Catégorie</th>
            <th>Date debut enchère</th>
            <th>Date fin enchère</th>
            <th>Prix de base</th>
            <th>Détails</th>
        </tr>
        </thead>

        <tbody>
        <tr data-th-each="item : ${articleLst}">
            <td data-th-text="${item.nom_article}">
            <td data-th-text="${item.categorie?.libelle}">
            <td data-th-text="${item.date_debut_enchere}">
            <td data-th-text="${item.date_fin_enchere}">
            <td data-th-text="${item.prix_de_base}">
            <td><a th:href="@{/encheres/details_vente(id=${item.id_article})}">Details de Vente</a></td>
        </tr>
        </tbody>


    </table>


</main>


</html>
